{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card shadow mb-4">
            <div class="card-header bg-dark text-white">Add New Class</div>
            <div class="card-body small">
                <form method="POST">
                    <div class="mb-2">
                        <label class="form-label">Class Name</label>
                        <input type="text" name="name" class="form-control form-control-sm" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Schedule</label>
                        <input type="text" name="schedule" class="form-control form-control-sm" placeholder="Mon/Wed 10-11:30" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Instructor</label>
                        <select name="instructor_id" class="form-select form-select-sm" required>
                            {% for inst in instructors %}
                                <option value="{{ inst.id }}">{{ inst.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Semester</label>
                        <select name="semester_id" class="form-select form-select-sm" required>
                            {% for sem in semesters %}
                                <option value="{{ sem.id }}">{{ sem.name }} (P{{ sem.current_period }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Size Limit</label>
                        <input type="number" name="size_limit" class="form-control form-control-sm" value="30" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm w-100 mt-2">Create Class</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">All Classes</div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0 small">
                    <thead class="table-light">
                        <tr>
                            <th>Class</th>
                            <th>Instructor</th>
                            <th>Semester</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for c in classes %}
                        <tr>
                            <td>{{ c.name }}<br><span class="text-muted">{{ c.schedule }}</span></td>
                            <td>{{ c.instructor_id }}</td> {# Better to show name if joined #}
                            <td>{{ c.semester_id }}</td>
                            <td>
                                <span class="badge bg-{{ 'success' if c.status == 'open' else 'secondary' if c.status == 'closed' else 'danger' }}">
                                    {{ c.status|capitalize }}
                                </span>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
